apiVersion: apps/v1
kind: Deployment
metadata:
  name: adk-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: adk-agent
  template:
    metadata:
      labels:
        app: adk-agent
    spec:
      serviceAccount: adk-agent-sa
      containers:
      - name: adk-agent
        imagePullPolicy: Always
        image: australia-southeast2-docker.pkg.dev/aihealth-450705/adk-repo/adk-agent:latest
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
            ephemeral-storage: "128Mi" # ephemeral-storage is for temporary storage, separate from PVC
          requests:
            memory: "128Mi"
            cpu: "500m"
            ephemeral-storage: "128Mi" # ephemeral-storage is for temporary storage, separate from PVC
        ports:
        - containerPort: 8080
        env:
          - name: PORT
            value: "8080"
          # If using AI Studio, set GOOGLE_GENAI_USE_VERTEXAI to false and set the following:
          # - name: GOOGLE_API_KEY
          #   value: GOOGLE_API_KEY
          # Add any other necessary environment variables your agent might need
        volumeMounts:
        - name: adk-data-volume
          mountPath: /app/data # This is the "base directory" inside your container
      volumes:
      - name: adk-data-volume
        persistentVolumeClaim:
          claimName: adk-agent-pvc # This references the PVC you'll define below
---
apiVersion: v1
kind: Service
metadata:
  name: adk-agent
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8080
  selector:
    app: adk-agent
---
# ADD THIS PersistentVolumeClaim DEFINITION
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: adk-agent-pvc
spec:
  accessModes:
    - ReadWriteOnce # This means it can be mounted as read-write by a single node
  storageClassName: standard # Use the default GKE StorageClass for Persistent Disks
  resources:
    requests:
      storage: 10Gi # Request 10 GB of storage. Adjust this size as needed!