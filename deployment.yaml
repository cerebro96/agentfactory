apiVersion: apps/v1
kind: Deployment
metadata:
  name: adk-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adk-agent
  template:
    metadata:
      labels:
        app: adk-agent
    spec:
      serviceAccount: adk-agent-sa
      # securityContext:
      #   fsGroup: 1000 # This ensures the mounted volume is accessible to processes
                      # running with group ID 1000 inside the container.
                      # You can choose any valid group ID; 1000 is a common choice.
      # --- END SECURITY CONTEXT ---
      containers:
      - name: adk-agent
        imagePullPolicy: Always
        image: australia-southeast2-docker.pkg.dev/aihealth-450705/adk-repo/adk-agent:v1
        resources:
          limits:
            memory: "4Gi"
            cpu: "1500m"
            ephemeral-storage: "2Gi"
          requests:
            memory: "4Gi"
            cpu: "1500m"
            ephemeral-storage: "2Gi"
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        - name: AGENT_DIR
          value: "/app"
        # - name: GOOGLE_API_KEY
        #   value: GOOGLE_API_KEY
        # Add any other necessary environment variables your agent might need

        # --- ADDED HEALTH PROBES ---
        livenessProbe:
          httpGet:
            path: /healthz # Replace with your actual health check endpoint
            port: 8080
          initialDelaySeconds: 30 # Time to wait before the first probe
          periodSeconds: 120    # How often to probe
          timeoutSeconds: 60     # When the probe times out
          failureThreshold: 15   # How many failures before restarting
        readinessProbe:
          httpGet:
            path: /healthz # Replace with your actual health check endpoint
            port: 8080
          initialDelaySeconds: 15 # Time to wait before the first probe
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3   # How many failures before marking as Unready
        # --- END ADDED HEALTH PROBES ---

      #   volumeMounts:
      #   - name: adk-data-volume
      #     mountPath: /app/data # This is the "base directory" inside your container
      # volumes:
      # - name: adk-data-volume
      #   persistentVolumeClaim:
      #     claimName: adk-agent-pvc # This references the PVC
---
apiVersion: v1
kind: Service
metadata:
  name: adk-agent
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8080
  selector:
    app: adk-agent
